<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CariPang Prokopim Tapin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        /**
         * Komponen Ikon Kustom untuk membungkus Lucide
         */
        const Icon = ({ name, size = 18, className = "" }) => {
            const [iconContent, setIconContent] = useState(null);

            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const iconData = window.lucide.icons[name];
                        if (iconData && Array.isArray(iconData)) {
                            const [tagName, attributes, children] = iconData;
                            
                            const finalAttributes = {
                                ...attributes,
                                width: size,
                                height: size,
                                class: `lucide lucide-${name.toLowerCase()} ${className}`,
                                'stroke-width': 2,
                                xmlns: "http://www.w3.org/2000/svg",
                                viewBox: "0 0 24 24",
                                fill: "none",
                                stroke: "currentColor",
                                'stroke-linecap': "round",
                                'stroke-linejoin': "round"
                            };

                            const renderElement = (elementData, key) => {
                                if (!elementData || !Array.isArray(elementData)) return null;
                                const [tag, attrs, kids] = elementData;
                                return React.createElement(
                                    tag,
                                    { ...attrs, key },
                                    (kids && Array.isArray(kids)) ? kids.map((child, idx) => renderElement(child, idx)) : null
                                );
                            };

                            const element = React.createElement(
                                'svg',
                                finalAttributes,
                                (children && Array.isArray(children)) ? children.map((child, idx) => renderElement(child, idx)) : null
                            );
                            
                            setIconContent(element);
                        }
                    }
                };

                renderIcon();
            }, [name, size, className]);

            return iconContent || <span style={{ width: size, height: size, display: 'inline-block' }} className={className} />;
        };

        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwx0HBJiGhTmUHhJq5aS-xZzQ4UCJJYN3JcNrmwnIhlEf6qiQkk6Z5tw3f7waU0DYIw/exec";

        function App() {
            const [view, setView] = useState('home');
            const [searchQuery, setSearchQuery] = useState('');
            const [sortBy, setSortBy] = useState('newest');
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [photoData, setPhotoData] = useState([]);
            const [pin, setPin] = useState('');
            const [loginError, setLoginError] = useState('');

            const photographers = ["Kaka Umar Dani", "Mister Adhan", "Mas Rehan", "Bro Ando", "Abang Bintang", "Bang Baim", "Mang Gigit"];
            const eventTags = ["Rapat", "Pelantikan", "Pendidikan", "Sosialisasi", "Kunjungan Kerja", "Upacara", "Audiensi", "Peresmian", "Seminar/Webinar", "Kegiatan Keagamaan", "Lainnya"];

            const [formData, setFormData] = useState({
                title: '',
                date: '',
                photographer: 'Kaka Umar Dani',
                leader: 'Bupati',
                tag: 'Rapat',
                link: ''
            });

            const fetchData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(GOOGLE_SHEET_URL);
                    const data = await response.json();
                    if (Array.isArray(data)) setPhotoData(data);
                } catch (error) {
                    console.error("Fetch error:", error);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const processedData = useMemo(() => {
                let filtered = photoData.filter(item => {
                    const term = searchQuery.toLowerCase();
                    return (item.title?.toLowerCase().includes(term) || 
                            item.tag?.toLowerCase().includes(term) || 
                            item.photographer?.toLowerCase().includes(term) || 
                            item.leader?.toLowerCase().includes(term));
                });
                return filtered.sort((a, b) => {
                    const dateA = new Date(a.date);
                    const dateB = new Date(b.date);
                    return sortBy === 'newest' ? dateB - dateA : dateA - dateB;
                });
            }, [photoData, searchQuery, sortBy]);

            const displayData = searchQuery === '' ? processedData.slice(0, 5) : processedData;

            const handleLogin = (e) => {
                e.preventDefault();
                if (pin === '1234') { setView('admin'); setLoginError(''); setPin(''); }
                else { setLoginError('PIN salah.'); }
            };

            const handleSaveData = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    await fetch(GOOGLE_SHEET_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(formData),
                    });
                    setTimeout(() => {
                        fetchData();
                        setFormData({ title: '', date: '', photographer: 'Kaka Umar Dani', leader: 'Bupati', tag: 'Rapat', link: '' });
                        setIsSubmitting(false);
                        setView('home');
                    }, 2500);
                } catch (error) {
                    setIsSubmitting(false);
                    alert("Gagal mengirim data.");
                }
            };

            if (loading && photoData.length === 0) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#F8FAFC]">
                        <Icon name="Loader2" size={40} className="text-emerald-600 animate-spin mb-4" />
                        <p className="text-slate-500 font-bold animate-pulse">Menghubungkan ke Database...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header / Navigasi */}
                    <nav className="sticky top-0 z-50 backdrop-blur-xl bg-white/80 border-b border-gray-100 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                                <div className="bg-gradient-to-tr from-emerald-700 to-emerald-500 p-2 rounded-xl shadow-lg shadow-emerald-200">
                                    <Icon name="Image" className="text-white" size={24} />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black tracking-tight text-slate-800 leading-none">CARI<span className="text-emerald-600 font-light">PANG</span></h1>
                                    <p className="text-[10px] font-bold text-slate-400 tracking-widest uppercase mt-1">Prokopim Tapin</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-6">
                                <button onClick={fetchData} className="p-2 text-slate-400 hover:text-emerald-600 transition">
                                    <Icon name="RefreshCw" className={loading ? 'animate-spin' : ''} />
                                </button>
                                <button onClick={() => setView('home')} className={`text-sm font-bold ${view === 'home' ? 'text-emerald-600' : 'text-slate-500'}`}>Beranda</button>
                            </div>
                        </div>
                    </nav>

                    {/* Konten Utama */}
                    <main className="flex-grow">
                        {view === 'home' && (
                            <div className="max-w-7xl mx-auto px-6 py-12">
                                <div className="text-center mb-16 relative">
                                    <h2 className="text-4xl md:text-6xl font-black text-slate-900 mb-6 tracking-tight">Dokumentasi <span className="text-emerald-600 italic">Photo</span>.</h2>
                                    <div className="flex flex-col md:flex-row gap-4 max-w-3xl mx-auto bg-white p-2 rounded-2xl shadow-xl border-2 border-emerald-600 mt-10">
                                        <div className="relative flex-grow flex items-center px-4">
                                            <Icon name="Search" className="text-emerald-600" />
                                            <input 
                                                type="text" 
                                                placeholder="Cari acara, pimpinan..." 
                                                className="w-full p-4 outline-none font-semibold"
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                            />
                                        </div>
                                        <select className="p-4 font-bold text-slate-700 outline-none rounded-xl" value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
                                            <option value="newest">Terbaru</option>
                                            <option value="oldest">Terlama</option>
                                        </select>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {displayData.map((item, idx) => (
                                        <div key={idx} className="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm hover:shadow-xl transition flex flex-col h-full">
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="text-[10px] font-bold text-slate-400 flex items-center gap-1 uppercase tracking-widest"><Icon name="Calendar" size={12}/> {item.date?.split('T')[0]}</span>
                                                <span className="px-2 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-black rounded border border-emerald-100 uppercase">{item.leader}</span>
                                            </div>
                                            <h3 className="text-xl font-bold text-slate-800 mb-4 flex-grow">{item.title}</h3>
                                            <p className="text-slate-400 text-sm mb-6 flex items-center gap-2"><Icon name="User" size={14}/> {item.photographer}</p>
                                            <a href={item.link} target="_blank" className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest text-center flex items-center justify-center gap-2 hover:bg-emerald-600 transition">Buka Drive <Icon name="ExternalLink" size={14}/></a>
                                        </div>
                                    ))}
                                    {displayData.length === 0 && (
                                        <div className="col-span-full py-20 text-center">
                                            <p className="text-slate-400 font-bold italic">Tidak ada data yang ditemukan.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'login' && (
                            <div className="max-w-md mx-auto py-24 px-6">
                                <div className="bg-white rounded-3xl p-10 shadow-2xl text-center">
                                    <Icon name="ShieldCheck" size={48} className="text-emerald-600 mx-auto mb-4" />
                                    <h2 className="text-2xl font-black mb-6">Akses Staff</h2>
                                    <form onSubmit={handleLogin} className="space-y-4">
                                        <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} placeholder="••••" className="w-full text-center text-3xl tracking-[0.5em] p-4 bg-slate-50 rounded-2xl outline-none" maxLength={4} />
                                        {loginError && <p className="text-red-500 text-xs font-bold">{loginError}</p>}
                                        <button className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black">MASUK</button>
                                    </form>
                                    <button onClick={() => setView('home')} className="mt-6 text-slate-400 text-xs font-bold uppercase tracking-widest hover:text-emerald-600">Batal</button>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="max-w-4xl mx-auto py-12 px-6">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-3xl font-black">Input Dokumentasi</h2>
                                    <button onClick={() => setView('home')} className="text-slate-400 hover:text-red-500 transition font-black text-xs uppercase tracking-widest flex items-center gap-2">Keluar <Icon name="LogOut" size={14}/></button>
                                </div>
                                <form onSubmit={handleSaveData} className="bg-white p-10 rounded-3xl shadow-xl grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="md:col-span-2 space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400">Judul Acara</label>
                                        <input required className="w-full p-4 bg-slate-50 rounded-xl outline-emerald-500" value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400">Kategori</label>
                                        <select className="w-full p-4 bg-slate-50 rounded-xl outline-emerald-500" value={formData.tag} onChange={(e) => setFormData({...formData, tag: e.target.value})}>
                                            {eventTags.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400">Pimpinan</label>
                                        <select className="w-full p-4 bg-slate-50 rounded-xl outline-emerald-500" value={formData.leader} onChange={(e) => setFormData({...formData, leader: e.target.value})}>
                                            <option>Bupati</option><option>Wakil Bupati</option><option>Sekda</option><option>Video Greeting</option>
                                        </select>
                                    </div>
                                    <div className="md:col-span-2 space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400">Link Drive</label>
                                        <input required className="w-full p-4 bg-slate-50 rounded-xl outline-emerald-500" value={formData.link} onChange={(e) => setFormData({...formData, link: e.target.value})} />
                                    </div>
                                    <button type="submit" className="md:col-span-2 bg-emerald-600 text-white py-5 rounded-2xl font-black mt-4 disabled:opacity-50" disabled={isSubmitting}>
                                        {isSubmitting ? "MENGIRIM..." : "SIMPAN DATA"}
                                    </button>
                                </form>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-900 pt-20 pb-10 px-6 border-t-8 border-emerald-600">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12 mb-16">
                                <div>
                                    <h2 className="text-white font-black text-2xl mb-4 italic">CARI<span className="text-emerald-500">PANG</span></h2>
                                    <p className="text-slate-400 text-sm">Sistem Manajemen Dokumentasi Terpadu Bagian Protokol dan Komunikasi Pimpinan Sekretariat Daerah Kabupaten Tapin.</p>
                                </div>
                                <div>
                                    <h3 className="text-white font-bold mb-6 text-xs uppercase tracking-widest border-l-4 border-emerald-600 pl-4">Navigasi</h3>
                                    <ul className="text-slate-400 space-y-3 text-sm font-bold uppercase">
                                        <li className="cursor-pointer hover:text-emerald-500" onClick={() => setView('home')}>Beranda</li>
                                        <li className="cursor-pointer hover:text-emerald-500" onClick={() => setView('login')}>Akses Staff</li>
                                    </ul>
                                </div>
                                <div>
                                    <h3 className="text-white font-bold mb-6 text-xs uppercase tracking-widest border-l-4 border-emerald-600 pl-4">Kontak</h3>
                                    <div className="text-slate-400 space-y-3 text-sm">
                                        <p className="flex items-center gap-2"><Icon name="MapPin" size={14} className="text-emerald-500"/> Rantau, Kabupaten Tapin</p>
                                        <p className="flex items-center gap-2">
                                            <Icon name="MessageCircle" size={14} className="text-emerald-500"/>
                                            <a href="https://wa.me/6287813255991" target="_blank" className="hover:text-emerald-500">Whatsapp +62 878-1325-5991</a>
                                        </p>
                                    </div>
                                </div>
                            </div>
                            <div className="pt-10 border-t border-slate-800 text-center">
                                <p className="text-slate-500 text-[10px] font-black uppercase tracking-widest">© 2024 PROKOPIM KABUPATEN TAPIN. ALL RIGHTS RESERVED.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
